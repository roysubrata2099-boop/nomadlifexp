<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NomadLifeXP Blog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:#fff;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  background:#111;
}

.gradient{
  background:linear-gradient(90deg,#a855f7,#f97316,#3b82f6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.section{
  padding:60px 8%;
}

.post{
  display:flex;
  gap:30px;
  margin-bottom:80px;
  background:#0b0b0b;
  padding:30px;
  border-radius:20px;
}

.post img{
  width:40%;
  border-radius:15px;
}

.post-content{
  width:60%;
}

.btn{
  display:inline-block;
  margin-top:15px;
  padding:12px 22px;
  border-radius:30px;
  background:linear-gradient(90deg,#a855f7,#f97316);
  color:white;
  text-decoration:none;
  font-weight:600;
}

.btn:hover{
  transform:scale(1.05);
}

@media(max-width:900px){
  .post{flex-direction:column;}
  .post img,.post-content{width:100%;}
}

</style>
</head>

<body>

<nav>
  <h2 class="gradient">NomadLifeXP Blog</h2>
</nav>

<div class="section">

  <!-- BLOG 1 -->
  <div class="post">
    <img src="images/fitness.jpg">

    <div class="post-content">
      <h2 class="gradient">Why Fitness Consistency Matters</h2>
      <p>Real transformation comes from consistency, not motivation.</p>

      <a class="btn" href="fitness-consistency.html">Read More</a>
    </div>
  </div>

  <!-- BLOG 2 -->
  <div class="post">
    <img src="yoga2.jpg">

    <div class="post-content">
      <h2 class="gradient">Until You Realize This About Discipline</h2>
      <p>Discipline is the price of freedom and clarity.</p>

      <a class="btn" href="discipline-blog.html">Read More</a>
    </div>
  </div>

  <!-- BLOG 3 -->
  <div class="post">
    <img src="yoga-new.jpg">

    <div class="post-content">
      <h2 class="gradient">Discipline Creates Freedom</h2>
      <p>Coming soon...</p>

      <a class="btn" href="#">Coming Soon</a>
    </div>
  </div>

</div>

</body>
</html>
