- name: Build Jekyll site
  run: bundle exec jekyll build --trace

- name: Check generated files
  run: |
    echo "==== SITE FILES ===="
    find _site -maxdepth 2 -type f | sort | head -100

    echo "==== CHECK TEST PAGE ===="
    test -f _site/test-page.html && echo "FOUND test-page.html" || echo "MISSING test-page.html"

    echo "==== CHECK REDIRECT PAGE ===="
    test -f _site/fitness-consistency.html && echo "FOUND fitness-consistency.html" || echo "MISSING fitness-consistency.html"

- name: Upload Pages artifact
  uses: actions/upload-pages-artifact@v3
  with:
    path: ./_site
