<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NomadLifeXP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
  color: #fff;
}

section {
  padding: 80px 20px;
  max-width: 1000px;
  margin: auto;
}

.gradient {
  background: linear-gradient(90deg, #a855f7, #f97316, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  background: linear-gradient(90deg, #a855f7, #f97316);
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
              url("hero.jpg") center/cover no-repeat;
}

img {
  width: 100%;
  max-width: 600px;
  border-radius: 20px;
  margin-top: 20px;
}

footer {
  text-align: center;
  padding: 40px;
}
</style>
</head>

<body>

<section class="hero">
  <h1 class="gradient">NomadLifeXP — Evolve in Motion</h1>
  <p>Transform your mind, body, and spirit.</p>
</section>

<section style="text-align:center;">
  <h2 class="gradient">Balance Your Mind & Body</h2>
  <img src="yoga.jpg" alt="Yoga">
</section>

<footer>
  <p>Follow the journey</p>
</footer>

</body>
</html>
