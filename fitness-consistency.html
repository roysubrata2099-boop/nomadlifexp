<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Maps specific old paths to specific new Next.js paths
        const redirectMap = {
            "/fitness-consistency.html": "/blog/posts/passive-fitness-consumption-trap"
            // Add more old-to-new paths here as needed:
            // "/old-post.html": "/blog/posts/new-post-slug"
        };

        const currentPath = window.location.pathname;
        const targetPath = redirectMap[currentPath] || currentPath;
        
        // Redirects to your new Next.js Vercel site domain
        window.location.replace("https://www.nomadlifexp.com" + targetPath);
    </script>
</head>
<body>
    <p>Redirecting to new site...</p>
</body>
</html>
